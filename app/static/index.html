<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Detection Frontend</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 0 auto; padding: 24px; background: #f7f7f7; }
    h1 { color: #222; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 18px 40px rgba(0,0,0,.05); padding: 24px; margin-bottom: 24px; }
    label { display: block; margin-bottom: 14px; }
    input[type="number"], input[type="text"] { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    button { cursor: pointer; margin-top: 16px; padding: 12px 18px; border: none; border-radius: 10px; background: #0f62fe; color: white; font-weight: 700; }
    #result { margin-top: 24px; padding: 18px; border-radius: 12px; background: #eef4ff; border: 1px solid #d0e2ff; }
    .small { font-size: 0.95rem; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fraud Detection Frontend</h1>
    <p>Enter transaction features and click <strong>Predict</strong>. The page calls the existing `/predict` API using the current backend model.</p>
    <form id="predict-form">
      <label>
        API Key
        <input id="apiKey" type="text" value="fraud123" />
        <div class="small">The backend uses <code>x-api-key</code> header with value <strong>fraud123</strong>.</div>
      </label>
      <label>
        Transaction JSON
        <textarea id="jsonInput" rows="16" style="width:100%; box-sizing:border-box; padding:12px; border:1px solid #ccc; border-radius:8px; font-family: monospace; font-size: 0.95rem;">{
  "Time": 0,
  "V1": 0.0,
  "V2": 0.0,
  "V3": 0.0,
  "V4": 0.0,
  "V5": 0.0,
  "V6": 0.0,
  "V7": 0.0,
  "V8": 0.0,
  "V9": 0.0,
  "V10": 0.0,
  "V11": 0.0,
  "V12": 0.0,
  "V13": 0.0,
  "V14": 0.0,
  "V15": 0.0,
  "V16": 0.0,
  "V17": 0.0,
  "V18": 0.0,
  "V19": 0.0,
  "V20": 0.0,
  "V21": 0.0,
  "V22": 0.0,
  "V23": 0.0,
  "V24": 0.0,
  "V25": 0.0,
  "V26": 0.0,
  "V27": 0.0,
  "V28": 0.0,
  "Amount": 0.0
}</textarea>
      </label>
      <button type="submit">Predict</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('predict-form');
    const resultNode = document.getElementById('result');
    const jsonInput = document.getElementById('jsonInput');

    form.addEventListener('submit', async event => {
      event.preventDefault();
      resultNode.textContent = 'Predicting...';

      const apiKey = document.getElementById('apiKey').value.trim();
      let payload;

      try {
        payload = JSON.parse(jsonInput.value);
      } catch (error) {
        resultNode.innerHTML = `<strong>Error:</strong> Invalid JSON input. ${error.message}`;
        return;
      }

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.detail || 'Prediction request failed');
        }

        const body = await response.json();
        resultNode.innerHTML = `
          <strong>Prediction:</strong> ${body.prediction === 1 ? 'Fraudulent' : 'Not Fraudulent'}<br />
          <strong>Fraud Probability:</strong> ${body.fraud_probability}
        `;
      } catch (error) {
        resultNode.innerHTML = `<strong>Error:</strong> ${error.message}`;
      }
    });
  </script>
</body>
</html>
